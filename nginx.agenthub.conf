# ===========================================
# AgentHub Nginx 反向代理配置
# ===========================================
# 使用说明：
# 1. 将此文件复制到 /etc/nginx/sites-available/agenthub
# 2. 创建符号链接: sudo ln -s /etc/nginx/sites-available/agenthub /etc/nginx/sites-enabled/
# 3. 修改配置中的 yourdomain.com 为你的域名
# 4. 配置 SSL 证书（Let's Encrypt 或其他）
# 5. 测试配置: sudo nginx -t
# 6. 重载 Nginx: sudo systemctl reload nginx

# ===========================================
# HTTP 重定向到 HTTPS
# ===========================================
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$server_name$request_uri;
}

# ===========================================
# HTTPS 配置
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # -----------------------------------------
    # SSL 证书配置
    # -----------------------------------------
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
    # SSL 会话优化
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # -----------------------------------------
    # 安全头配置
    # -----------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://yourdomain.com;" always;

    # HSTS (可选，但推荐)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -----------------------------------------
    # 日志配置
    # -----------------------------------------
    access_log /var/log/nginx/agenthub_access.log;
    error_log /var/log/nginx/agenthub_error.log;

    # -----------------------------------------
    # Gzip 压缩
    # -----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/xml;

    # -----------------------------------------
    # 前端静态文件
    # -----------------------------------------
    root /var/www/agenthub/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------
    # API 反向代理
    # -----------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        
        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 请求头转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓存控制
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------------------
    # 上传文件大小限制
    # -----------------------------------------
    client_max_body_size 10M;

    # -----------------------------------------
    # 禁止访问隐藏文件
    # -----------------------------------------
    location ~ /\. {
        deny all;
    }

    # -----------------------------------------
    # 静态文件缓存
    # -----------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # -----------------------------------------
    # 健康检查端点
    # -----------------------------------------
    location /api/health {
        proxy_pass http://127.0.0.1:3001/api/health;
        access_log off;
    }
}

# ===========================================
